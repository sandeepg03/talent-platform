name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install \
            fastapi \
            "uvicorn[standard]" \
            sentence-transformers \
            faiss-cpu \
            python-docx \
            pydantic \
            loguru \
            joblib \
            plotly \
            pandas \
            numpy \
            requests \
            httpx \
            pytest \
            pytest-cov \
            anyio

      - name: Run unit tests (exclude integration)
        run: |
          python -m pytest tests/ \
            -m "not integration" \
            --tb=short \
            -q \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint deps
        run: pip install ruff mypy types-requests
      - name: Ruff lint
        run: ruff check src/ --select=E,F,W,I --ignore=E501
      - name: Ruff format check
        run: ruff format --check src/

  smoke-test-cli:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install \
            fastapi "uvicorn[standard]" sentence-transformers \
            faiss-cpu python-docx pydantic loguru joblib numpy
      - name: Verify CLI help exits 0
        run: |
          python precompute.py --help
          python rank.py --help

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t talent-platform:ci-test .
      - name: Verify image runs --help
        run: |
          docker run --rm talent-platform:ci-test python precompute.py --help
          docker run --rm talent-platform:ci-test python rank.py --help
